# nginx/nginx.prod.conf
# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy de producción para Acompañarte
#
# Responsabilidades:
#   - Servir el frontend React (archivos estáticos en /usr/share/nginx/html)
#   - Proxy /api/  → backend FastAPI (puerto 8000 interno)
#   - Soporte para SSL/HTTPS con certificados Let's Encrypt (ver bloque HTTPS)
#   - Headers de seguridad
#   - Timeout extendido para peticiones al módulo IA (pueden tardar 30-60s)
#
# Para activar HTTPS después de obtener el certificado:
#   1. Descomentár el bloque "server HTTPS"
#   2. Comentar el bloque "server HTTP"
#   3. Reiniciar: docker compose -f docker-compose.prod.yml restart frontend
# ─────────────────────────────────────────────────────────────────────────────

# ── Servidor HTTP (puerto 80) ────────────────────────────────────────────────
# Usado en la fase inicial (sin SSL todavía).
# Una vez instalado el certificado, este bloque solo hace redirect a HTTPS.
server {
    listen 80;
    server_name _;

    # ── ACME challenge para Let's Encrypt (certbot) ──────────────────────────
    # Dejar este bloque siempre activo — certbot necesita responder por HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Sin SSL: servir normalmente por HTTP ─────────────────────────────────
    # Una vez instalado SSL, reemplazar el bloque de abajo por:
    # return 301 https://$host$request_uri;

    # ── Cabeceras de seguridad básicas ───────────────────────────────────────
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header Referrer-Policy        "no-referrer"     always;

    # ── Proxy al backend FastAPI ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeout extendido para peticiones IA (RAG puede tardar 30-60s)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # Tamaño máximo para upload de documentos
        client_max_body_size 50M;
    }

    # ── Frontend React (archivos estáticos) ──────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # React Router: servir index.html para todas las rutas SPA
        try_files $uri $uri/ /index.html;

        # Cache de assets con hash (Vite genera nombres únicos)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}


