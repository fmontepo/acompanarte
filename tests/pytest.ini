[pytest]
# asyncio_mode = auto: no hace falta @pytest.mark.asyncio en cada test
asyncio_mode = auto

# asyncio_default_fixture_loop_scope = session
# Un único event loop para toda la sesión pytest.
# asyncpg vincula sus conexiones al loop del momento de creación.
# Si usáramos "module", el pool quedaría atado al primer loop
# y fallaría al reutilizarse en el segundo módulo.
asyncio_default_fixture_loop_scope = session

python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = false
log_level = WARNING
