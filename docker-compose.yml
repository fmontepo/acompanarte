version: "3.9"

services:

  db:
    image: ankane/pgvector:latest
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: acompanarte
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    depends_on:
        - db
    ports:
        - "8000:8000"
    volumes:
        - ./backend:/app
    environment:
        - DATABASE_URL=postgresql://app:app@db:5432/acompanarte
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  ia:
    image: python:3.11
    container_name: ia
    volumes:
      - ./ia:/app
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"

volumes:
  postgres_data: