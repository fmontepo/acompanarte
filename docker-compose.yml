version: "3.9"

services:

  db:
    image: pgvector/pgvector:pg15
    container_name: acompanarte_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-acomp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-acomp_pass}
      POSTGRES_DB: ${DB_NAME:-acompanarte_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-acomp_user} -d ${DB_NAME:-acompanarte_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acompanarte_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - hf_cache:/hf_cache   # cache del modelo fuera de /app para evitar conflictos de permisos
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-acomp_user}:${DB_PASSWORD:-acomp_pass}@db:5432/${DB_NAME:-acompanarte_db}
      SECRET_KEY: ${SECRET_KEY:-cambia_esto_en_produccion}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-cambia_esto_en_produccion}
      HF_HOME: /hf_cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acompanarte_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VITE_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
  hf_cache:       # modelo de embeddings — persiste entre reinicios del contenedor
