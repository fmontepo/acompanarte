[pytest]
# Este archivo se usa al correr pytest LOCALMENTE (fuera de Docker) desde backend/.
# Dentro de Docker el archivo activo es /tests/pytest.ini
asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
testpaths = ../tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = false
log_level = WARNING
